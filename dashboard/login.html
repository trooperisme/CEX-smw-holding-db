<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In | Hypurrscan Signals</title>
    <link rel="stylesheet" href="/dashboard/styles.css" />
  </head>
  <body class="login-page">
    <main class="login-shell">
      <section class="login-card">
        <p class="eyebrow">Private Access</p>
        <h1>Hypurrscan Signals</h1>
        <p class="login-copy">Enter the app password to access the manual refresh dashboard.</p>

        <form id="login-form" class="login-form">
          <label class="field-label" for="password">Password</label>
          <input id="password" name="password" type="password" autocomplete="current-password" required />
          <button class="action-button action-button--primary" type="submit">Open Dashboard</button>
          <p class="login-error" id="login-error" hidden></p>
        </form>
      </section>
    </main>

    <script>
      const form = document.getElementById("login-form");
      const errorEl = document.getElementById("login-error");

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        errorEl.hidden = true;

        const password = document.getElementById("password").value;
        const response = await fetch("/api/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ password }),
        });

        if (response.ok) {
          window.location.href = "/dashboard";
          return;
        }

        const payload = await response.json().catch(() => ({}));
        errorEl.textContent = payload.error || "Login failed";
        errorEl.hidden = false;
      });
    </script>
  </body>
</html>
